name: ecommerce-prod

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-e-commerce}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ecommerce_mysql_prod_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      - mysql
    volumes:
      - ecommerce_storage_prod_data:/var/www/html/storage/app/public
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

      - traefik.http.routers.ecommerce-web.rule=Host(`abbatech.dev.br`) && PathPrefix(`/abbatech/e-commerce`)
      - traefik.http.routers.ecommerce-web.entrypoints=web
      - traefik.http.routers.ecommerce-web.middlewares=redirect-to-https@file

      - traefik.http.routers.ecommerce-websecure.rule=Host(`abbatech.dev.br`) && PathPrefix(`/abbatech/e-commerce`)
      - traefik.http.routers.ecommerce-websecure.entrypoints=websecure
      - traefik.http.routers.ecommerce-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.ecommerce-websecure.middlewares=ecommerce-stripprefix
      - traefik.http.services.ecommerce-websecure.loadbalancer.server.port=80

      - traefik.http.middlewares.ecommerce-stripprefix.stripprefix.prefixes=/abbatech/e-commerce

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --timeout=120
    depends_on:
      - mysql
    networks:
      - default

volumes:
  ecommerce_mysql_prod_data:
  ecommerce_storage_prod_data:

networks:
  dokploy-network:
    external: true
