name: ecommerce-dev

services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-e-commerce}
      MYSQL_USER: ${DB_USERNAME:-ecommerce}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ecommerce}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "5506:3306"
    volumes:
      - ecommerce_mysql_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecommerce-mailpit
    restart: unless-stopped
    ports:
      - "5025:1025"
      - "5026:8025"

volumes:
  ecommerce_mysql_data:
